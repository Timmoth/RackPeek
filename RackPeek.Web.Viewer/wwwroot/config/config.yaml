version: 3
resources:
  - kind: Server
    ram:
      size: 128
      mts: 3200
    ipmi: true
    cpus:
      - model: AMD EPYC 7302P
        cores: 16
        threads: 32
    drives:
      - type: ssd
        size: 1024
      - type: ssd
        size: 1024
    ports:
      - type: rj45
        speed: 1
        count: 2
      - type: sfp+
        speed: 10
        count: 2
    name: proxmox-node01
    tags:
      - prod
      - infra
    labels:
      install-date: 2023-02-11
      rack-unit: U10
    notes: |-
      # Proxmox main node
      - 400w idle
      - 1200w load
  - kind: Server
    ram:
      size: 96
      mts: 2666
    ipmi: true
    cpus:
      - model: Intel Xeon Silver 4210
        cores: 10
        threads: 20
    drives:
      - type: ssd
        size: 1024
      - type: hdd
        size: 4096
    ports:
      - type: rj45
        speed: 1
        count: 2
      - type: sfp+
        speed: 10
        count: 1
    name: proxmox-node02
    tags:
      - prod
      - infra
    labels:
      install-date: 2023-02-12
      rack-unit: U11
  - kind: Server
    ram:
      size: 64
      mts: 2666
    ipmi: true
    cpus:
      - model: Intel Xeon E-2236
        cores: 6
        threads: 12
    drives:
      - type: hdd
        size: 8192
      - type: hdd
        size: 8192
      - type: hdd
        size: 8192
      - type: hdd
        size: 8192
    ports:
      - type: rj45
        speed: 1
        count: 1
      - type: sfp+
        speed: 10
        count: 1
    name: truenas-storage
    tags:
      - prod
    labels:
      install-date: 2022-08-20
      rack-unit: U12
  - kind: Firewall
    model: Netgate-6100
    managed: true
    poe: false
    ports:
      - type: rj45
        speed: 1
        count: 4
      - type: sfp+
        speed: 10
        count: 2
    name: pfsense-fw
    tags:
      - infra
    labels:
      install-date: 2022-03-10
  - kind: Router
    model: Ubiquiti-ER-4
    managed: true
    poe: false
    ports:
      - type: rj45
        speed: 1
        count: 4
      - type: sfp
        speed: 10
        count: 1
    name: core-router
    tags:
      - infra
    labels:
      install-date: 2022-03-01
  - kind: Switch
    model: UniFi-USW-Enterprise-24
    managed: true
    poe: true
    ports:
      - type: rj45
        speed: 1
        count: 12
      - type: rj45
        speed: 2.5
        count: 8
      - type: sfp+
        speed: 10
        count: 4
    name: core-switch
    tags:
      - infra
    labels:
      rack-unit: U15
  - kind: Switch
    model: UniFi-USW-16-PoE
    managed: true
    poe: true
    ports:
      - type: rj45
        speed: 1
        count: 16
      - type: sfp
        speed: 1
        count: 2
    name: access-switch
    tags:
      - infra
    labels:
      rack-unit: U16
  - kind: AccessPoint
    model: UniFi-U6-Pro
    speed: 2.5
    ports:
      - type: rj45
        speed: 2.5
        count: 1
    name: lounge-ap
    labels:
      install-date: 2023-06-05
      service-at: lounge
  - kind: System
    type: Hypervisor
    os: proxmox
    cores: 16
    ram: 128
    ip: 10.0.20.10
    name: proxmox-cluster-node01
    runsOn:
      - proxmox-node01
  - kind: System
    type: Hypervisor
    os: proxmox
    cores: 10
    ram: 96
    ip: 10.0.20.11
    name: proxmox-cluster-node02
    runsOn:
      - proxmox-node02
  - kind: System
    type: VM
    os: hassos
    cores: 2
    ram: 4
    ip: 192.168.0.10
    name: vm-home-assistant
    runsOn:
      - proxmox-cluster-node01
  - kind: System
    type: VM
    os: ubuntu-22.04
    cores: 4
    ram: 8
    ip: 192.168.0.20
    name: vm-media-server
    runsOn:
      - proxmox-cluster-node02
  - kind: System
    type: VM
    os: debian-12
    cores: 2
    ram: 4
    ip: 192.168.0.40
    name: vm-monitoring
    runsOn:
      - proxmox-cluster-node01
  - kind: System
    type: container
    os: alpine
    cores: 1
    ram: 1
    ip: 192.168.0.41
    name: ctr-grafana
    runsOn:
      - vm-monitoring
  - kind: Service
    network:
      port: 8123
      protocol: TCP
      url: http://homeassistant.lan:8123
    name: home-assistant
    labels:
      service-at: home
    runsOn:
      - vm-home-assistant
  - kind: Service
    network:
      port: 32400
      protocol: TCP
      url: http://plex.lan:32400
    name: plex
    tags:
      - media
    runsOn:
      - vm-media-server
  - kind: Service
    network:
      port: 8096
      protocol: TCP
      url: http://jellyfin.lan:8096
    name: jellyfin
    tags:
      - media
    runsOn:
      - vm-media-server
  - kind: Service
    network:
      port: 8080
      protocol: TCP
      url: http://immich.lan:8080
    name: immich
    tags:
      - media
    runsOn:
      - vm-media-server
  - kind: Service
    network:
      port: 3000
      protocol: TCP
      url: http://grafana.lan:3000
    name: grafana
    tags:
      - containers
    runsOn:
      - ctr-grafana
  - kind: Service
    network:
      port: 9090
      protocol: TCP
      url: http://prometheus.lan:9090
    name: prometheus
    runsOn:
      - vm-monitoring
connections:
  - a:
      resource: core-router
      portGroup: 0
      portIndex: 0
    b:
      resource: pfsense-fw
      portGroup: 0
      portIndex: 0
    label: wan-link
  - a:
      resource: pfsense-fw
      portGroup: 1
      portIndex: 0
    b:
      resource: core-switch
      portGroup: 2
      portIndex: 0
    label: firewall-lan
  - a:
      resource: core-switch
      portGroup: 2
      portIndex: 1
    b:
      resource: access-switch
      portGroup: 1
      portIndex: 0
    label: switch-uplink
  - a:
      resource: proxmox-node01
      portGroup: 1
      portIndex: 0
    b:
      resource: core-switch
      portGroup: 2
      portIndex: 2
    label: node01-10g
  - a:
      resource: proxmox-node02
      portGroup: 1
      portIndex: 0
    b:
      resource: core-switch
      portGroup: 2
      portIndex: 3
    label: node02-10g
  - a:
      resource: truenas-storage
      portGroup: 1
      portIndex: 0
    b:
      resource: core-switch
      portGroup: 0
      portIndex: 4
    label: storage-link
  - a:
      resource: lounge-ap
      portGroup: 0
      portIndex: 0
    b:
      resource: access-switch
      portGroup: 0
      portIndex: 1
    label: wifi-uplink
